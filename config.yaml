# ============================================================================
# Kalm 主配置文件
# ============================================================================
# 此文件是 Kalm 平台的核心配置，控制 API 服务、任务调度、执行器映射等行为。
# 支持 `${ENV_VAR}` 语法引用环境变量，例如: `${API_TOKEN}`
#
# 修改配置后需要重启 Kalm 服务才能生效。
# ============================================================================

# ============================================================================
# 应用基本信息
# ============================================================================
# 定义应用名称、版本和调试模式。
app:
  name: "Kalm"                    # 应用名称，显示在日志和 API 信息中
  version: "1.0.0"                # 应用版本号
  debug: true                     # 调试模式开关
                                    # true:  启用详细日志、热重载、错误堆栈展示（开发环境推荐）
                                    # false: 生产模式，减少日志输出，隐藏敏感信息（生产环境推荐）

# ----------------------------------------------------------------------------
# API 服务配置
# ----------------------------------------------------------------------------
# 控制 FastAPI 服务器的网络绑定和认证。
api_server:
  host: "0.0.0.0"                 # 服务器监听地址
                                    # "0.0.0.0": 监听所有网卡（允许外部访问）
                                    # "127.0.0.1": 仅本地访问（更安全）
  port: 7000                      # 服务器监听端口，修改后通过 http://<host>:<port> 访问
  tokens:                         # Bearer Token 认证白名单列表
                                    # 客户端请求时需在 Header 中携带: Authorization: Bearer <token>
                                    # 留空或不配置则跳过认证（不推荐在生产环境使用）
    - "123456"                    #   默认测试 Token，请修改为复杂值

# ----------------------------------------------------------------------------
# 任务调度器配置
# ----------------------------------------------------------------------------
# 控制后端服务的生命周期管理和任务执行超时。
scheduler:
  idle_timeout: 10                # 服务空闲超时（秒）
                                    # 任务完成后，如果在此时间内没有新任务，将关闭后端服务以释放资源
                                    # 值越小越节省资源，但频繁启停会增加延迟
                                    # 值越大响应越快，但占用更多内存
  startup_timeout: 300            # 服务启动超时（秒）
                                    # 后端服务从启动到就绪的最大等待时间
                                    # 大型模型服务（如 ComfyUI）可能需要较长启动时间
  download_idle_timeout: 10       # 等待客户端下载的超时（秒）
                                    # 任务完成后，等待客户端下载结果文件的最大时间
                                    # 超时后文件将被清理，客户端需要重新提交任务

# ----------------------------------------------------------------------------
# 任务类型 → 后端服务映射
# ----------------------------------------------------------------------------
# 定义每种任务类型对应的后端服务、追踪模式和执行器。
# 新增任务类型时，在此添加新条目即可，无需修改调度器代码。
#
# 字段说明:
#   service    - 对应 services.yaml 中定义的后端服务名称
#   track_mode - 任务状态追踪方式:
#                 ws     - WebSocket 实时推送（适合长时间任务，如图片生成）
#                 poll   - 轮询查询（适合常规异步任务，如 TTS）
#                 stream - 流式响应（适合需要实时输出的任务，如 LLM 对话）
#   executor   - 执行器模块和函数，通过 importlib 动态加载
tasks:

  # --------------------------------------------------------------------------
  # ComfyUI 图像生成任务
  # --------------------------------------------------------------------------
  # 调用 ComfyUI 服务进行 AI 图片生成
  comfyui:
    service: "ComfyUI_Windows"    # 对应 services.yaml 中的 ComfyUI_Windows 服务定义（Windows 平台）
    # 切换到 Linux 平台时，改为: service: "ComfyUI_Linux"
    track_mode: ws                # WebSocket 模式：实时接收生成进度和结果
    executor:
      module: "src.core.executors.image"    # 执行器模块路径
      function: "execute"                   # 执行函数名

  # --------------------------------------------------------------------------
  # LLM 对话任务（非流式）
  # --------------------------------------------------------------------------
  # 调用 Ollama 本地大模型进行对话，等待完整响应后返回
  llm:
    service: "Ollama"             # 对应 services.yaml 中的 Ollama 服务定义
    track_mode: poll              # 轮询模式：定期查询任务状态直到完成
    executor:
      module: "src.core.executors.llm"
      function: "execute"

  # --------------------------------------------------------------------------
  # LLM 对话任务（流式）
  # --------------------------------------------------------------------------
  # 调用 Ollama 本地大模型进行对话，逐 token 流式返回响应
  llm_streaming:
    service: "Ollama"
    track_mode: stream            # 流式模式：实时推送每个生成的 token
    executor:
      module: "src.core.executors.llm"
      function: "execute_stream"  # 注意：使用流式执行函数

  # --------------------------------------------------------------------------
  # TTS 语音合成任务
  # --------------------------------------------------------------------------
  # 调用 TTS 服务将文本转换为语音
  tts:
    service: "TTS_Windows"        # 对应 services.yaml 中的 TTS_Windows 服务定义（Windows 平台）
    # 切换到 Linux 平台时，改为: service: "TTS_Linux"
    track_mode: poll              # 轮询模式：等待合成完成后返回音频文件
    executor:
      module: "src.core.executors.tts"
      function: "execute"

  # --------------------------------------------------------------------------
  # 字幕生成任务
  # --------------------------------------------------------------------------
  # 调用 TTS 服务的 Whisper 功能，为音频生成对齐字幕
  subtitle:
    service: "TTS_Windows"        # 复用 TTS_Windows 服务（共享 Whisper 模型）
    # 切换到 Linux 平台时，改为: service: "TTS_Linux"
    track_mode: poll
    executor:
      module: "src.core.executors.subtitle"
      function: "execute"

# ----------------------------------------------------------------------------
# LLM 本地模型配置
# ----------------------------------------------------------------------------
# 定义可用的本地大模型列表，前端可选择这些模型进行对话。
# 模型名称格式: <模型名>:<参数量>，需与 Ollama 拉取的模型名称一致。
llm_config:
  local_models:
    - "gpt-oss:20b"               # GPT 开源版本，20B 参数
    - "gemma3:12b"                # Google Gemma 3，12B 参数
    - "qwen3:14b"                 # 阿里通义千问 3，14B 参数
    - "qwen2.5:32b"               # 阿里通义千问 2.5，32B 参数
    # 添加新模型步骤:
    #   1. 使用 Ollama 拉取模型: ollama pull <model_name>
    #   2. 在此列表中添加模型名称

# ----------------------------------------------------------------------------
# 路径配置
# ----------------------------------------------------------------------------
# 定义任务相关文件的存储路径。
paths:
  task_folder: "tasks"            # 任务工作目录（相对路径，基于项目根目录）
                                    # 每个任务会在此目录下创建临时文件夹，
                                    # 存储生成的音频、图片、字幕等文件

# ----------------------------------------------------------------------------
# 自动清理配置
# ----------------------------------------------------------------------------
# 定期清理过期任务文件，防止磁盘空间被占满。
auto_cleanup_interval_hours: 0.5  # 清理检查间隔（小时）
                                    # 每 0.5 小时（30分钟）检查一次过期任务
                                    # 设置为 0 则禁用自动清理
auto_cleanup_tasks_time: 4        # 任务保留时间（小时）
                                    # 完成超过 4 小时的任务文件将被自动删除
                                    # 包括生成的音频、图片、字幕等产物